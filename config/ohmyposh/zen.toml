
version = 3
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

[palette]
green = "#00ff00"

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true
	[[blocks.segments]]
	type = 'path'
	style = 'plain'
	background = 'transparent'
	foreground = 'blue'
	template = '{{ .Path }}'
		[blocks.segments.properties]
		style = 'full'

	[[blocks.segments]]
	type = 'git'
	style = 'plain'
	foreground = '#6c6c6c'
	background = 'transparent'
	template = ' {{ .HEAD }}{{if or (.Working.Changed) (.Staging.Changed)}}*{{end}} <cyan>{{if gt .Behind 0}}⇣{{end}}{{if gt .Ahead 0}}⇡{{end}}</>'	
		[blocks.segments.properties]
		branch_icon = ''
		commit_icon = '@'
		fetch_status = true

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true
	[[blocks.segments]]
	type = 'text'
	style = 'plain'
	foreground = 'magenta'
	background = 'transparent'
	template = "❯"

[transient_prompt]
foreground = 'magenta'
background = 'transparent'
template = "❯ "

[secondary_prompt]
foreground = 'magenta'
background = 'transparent'
template = '❯❯ '
